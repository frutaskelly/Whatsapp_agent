# Configuración para deploy automático en Render.
# Render lee este archivo cuando conectas el repo de GitHub.
#
# IMPORTANTE — disco persistente:
#   Para que el state runtime (pedidos_dia, extras_dia, folio counters,
#   conversations, logs, configs editables) NO se borre en cada redeploy,
#   este servicio usa un Persistent Disk montado en /var/data, y la app
#   apunta STORAGE_DIR=/var/data. Esto requiere plan Starter ($7/mes).
#   En el primer arranque, app/bootstrap.py copia los seeds del repo
#   (whatsapp_agent/storage/) al disco vacío y a partir de ahí los
#   redeploys ya no lo tocan.

services:
  - type: web
    name: frutaskelly-whatsapp-agent
    runtime: python
    # NO declaramos `plan` aquí a propósito: dejamos que el dashboard de
    # Render sea la fuente de verdad. Si declaramos plan: starter aquí y
    # el dashboard tiene Pro, Render baja el servicio a Starter en el
    # próximo deploy (sobreescribe el upgrade manual). El persistent disk
    # solo requiere starter o superior — y ambos están disponibles.
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app.main:app
    disk:
      name: storage
      mountPath: /var/data
      sizeGB: 1  # holgado para JSONs, folio counters, conversations, logs
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENVIRONMENT
        value: production
      - key: STORAGE_DIR
        value: /var/data
      # Las variables sensibles se configuran desde el dashboard de Render
      # NO ponerlas aquí (se subiría a GitHub):
      # - WHATSAPP_ACCESS_TOKEN
      # - WHATSAPP_PHONE_NUMBER_ID
      # - WHATSAPP_VERIFY_TOKEN
      # - ANTHROPIC_API_KEY
      # - EHMO_PHONE
    healthCheckPath: /health
    autoDeploy: true
